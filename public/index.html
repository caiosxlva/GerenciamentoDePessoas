<html>
    <head>
        <title>Exemplo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="index.css"/>
    </head>
    <body class="container bg-light"> <div class="py-5 text-center">
            <h1 class="display-5 fw-bold">Gerenciamento de Pessoas</h1>
            <p class="lead">Sistema de cadastro com segurança e e-mail.</p>
        </div>

        <div class="d-grid gap-2 d-md-block mb-4">
            <button class="btn btn-primary shadow-sm" onclick="novo()">+ Novo Cadastro</button>
        </div>

        <div id="conteudo" class="bg-white p-3 border rounded shadow-sm">
            </div>

        <div id="formulario" style="display: none;" class="card shadow-sm mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Dados da Pessoa</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome:</label>
                    <input type="text" id="txtnome" class="form-control" placeholder="Digite o nome completo"/>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Telefone:</label>
                    <input type="text" id="txttelefone" class="form-control" placeholder="(00) 00000-0000"/>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">E-mail:</label>
                    <input type="text" id="txtemail" class="form-control" placeholder="exemplo@email.com"/>
                </div>

                <div class="mt-4">
                    <button class="btn btn-success px-4" onclick="salvar()">Gravar Dados</button>
                    <button class="btn btn-outline-secondary px-4" onclick="cancelar()">Cancelar</button>
                </div>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
